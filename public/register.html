<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Secure Chat App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body id="body">
  <div class="container">
    <h2>Create Account</h2>
    <p style="margin-top:-15px; margin-bottom: 25px; font-size: 14px;">Register a new profile to get started</p>
    
    <div class="input-group">
      <label for="name">Full Name</label>
      <input id="name" type="text" placeholder="John Doe" autocomplete="name" required>
    </div>
    
    <div class="input-group">
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="name@example.com" autocomplete="email" required>
    </div>
    
    <div class="input-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" required>
    </div>
    
    <button onclick="registerUser()">
      Get Started
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-user-plus"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
    </button>
    
    <p>
      Already have an account? 
      <a href="index.html">Sign In</a>
    </p>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
